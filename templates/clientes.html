  {% extends 'layout.html' %}
    
    {% block content %}
        <h1>Clientes</h1> <button onclick="jsModalCrearCliente()" class="btn btn-success mb-3">Nuevo</button>

        <table class="table table-striped table-dark">
        <thead>
            <tr>
            <th scope="col">ID</th>
            <th scope="col">Nombres</th>
            <th scope="col">Apellidos</th>
            <th scope="col">Edad</th>
            <th scope="col">Acciones</th>
            </tr>
        </thead>
        <tbody>
            {% for cliente in Clientes %}
            <tr>
                <th scope="row">{{cliente.0}}</th>
                <td>{{cliente.1}}</td>
                <td>{{cliente.2}}</td>
                <td>{{cliente.3}}</td>
                <td>
                    <a class="btn btn-warning" href="/editar-cliente">Editar</a>
                    <a class="btn btn-danger">Borrar</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
        </table>

    {% endblock %}
